<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin</title>
</head>
<body>
  <div id="nc-root"></div>
  <script>
    window.CMS_CONFIG = {
      backend: {
        name: "github",
        repo: "ShevtsovAndrey/Media",
        branch: "main"
      },
      site_url: "https://shevtsovandrey.github.io/Media",
      media_folder: "assets/img",
      public_folder: "/assets/img",
      collections: [{
        name: "gallery",
        label: "Gallery",
        folder: "data",
        create: true,
        format: "json",
        extension: "json",
        fields: [
          { label: "Title", name: "title", widget: "string" },
          { label: "Location", name: "location", widget: "string" },
          { label: "Description", name: "description", widget: "text", required: false },
          { label: "Photo", name: "image", widget: "image" }
        ]
      }]
    };
  </script>
  <script src="https://unpkg.com/netlify-cms@2.10.19/dist/netlify-cms.js"></script>
</body>
</html>
