<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin</title>
  <style>body{margin:0;font-family:sans-serif;background:#f0f2f5}#nc-root{min-height:100vh}</style>
</head>
<body>
  <div id="nc-root"></div>
  <script>
    window.CMS_CONFIG = {
      backend: {
        name: "github",
        repo: "ShevtsovAndrey/Media",
        branch: "main",
        auth_type: "implicit",
        client_id: "Ov23lic7FhjBNL3GIDgc"
      },
      site_url: "https://shevtsovandrey.github.io/Media",
      display_url: "https://shevtsovandrey.github.io/Media",
      media_folder: "assets/img",
      public_folder: "/assets/img",
      collections: [{
        name: "gallery",
        label: "Gallery",
        folder: "data",
        create: true,
        format: "json",
        extension: "json",
        fields: [
          { label: "Title", name: "title", widget: "string" },
          { label: "Location", name: "location", widget: "string" },
          { label: "Description", name: "description", widget: "text", required: false },
          { label: "Photo", name: "image", widget: "image" }
        ]
      }]
    };
  </script>
  <!-- ?v=3 заставляет браузер скачать свежий скрипт, игнорируя кэш -->
  <script src="https://cdn.jsdelivr.net/npm/decap-cms@3.3.2/dist/decap-cms.js?v=3"></script>
</body>
</html>
