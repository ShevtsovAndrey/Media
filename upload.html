<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ввод ключа доступа к медиа</title>
    <link rel="stylesheet" href="key.css">
</head>
<body>
    <div class="box">
        <h2>Ключ доступа 🔑</h2>
        <p>Введи ключ доступа к публикациям и нажми "Сохранить". Ключ будет привязан к одному устройству до полной очистки кэша</p>
        <input type="text" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxxxxx">
        <button onclick="saveToken()">Сохранить</button>
        <p class="status" id="status"></p>
    </div>

    <script>
        // При открытии подставляем токен, если он уже есть
        document.getElementById('tokenInput').value = localStorage.getItem('github_token') || '';

        function saveToken() {
            const token = document.getElementById('tokenInput').value.trim();
            if (!token) {
                document.getElementById('status').textContent = ' Нужен токен ❌';
                return;
            }
            localStorage.setItem('github_token', token);
            document.getElementById('status').className = 'status success';
            document.getElementById('status').textContent = 'Сохранено ✅';
            
        }
    </script>
</body>
</html>
