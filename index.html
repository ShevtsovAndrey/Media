<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shevtsov Media</title>
    <link rel="stylesheet" href="style.css">
</head>
    <!-- БЛЮР ДЛЯ ДРАГАНДРОП -->
<div id="dragOverlay" class="drag-overlay">Drop photo and load it</div>
    <!-- КНОПКА ДОБАВЛЕНИЯ ТЕГОВ -->
<div id="editModal" class="edit-modal">
    <div class="edit-modal-content">
        <h3 style="margin:0 0 10px; color:#fff;">Редактировать год</h3>
        <label style="color:#ccc; font-size:14px;">Год:</label>
        <input type="number" id="editYearInput" min="1900" max="2100" placeholder="Например: 2024">
        <div class="edit-modal-actions">
            <button id="cancelEditBtn">Отмена</button>
            <button id="saveEditBtn" title="Применить"><img src="edit.png" class="icon-svg"></button>
        </div>
        <div id="editSuccessMsg" class="success-msg">тег добавлен</div>
    </div>
</div>

<body>
    <main id="gallery" class="gallery"></main>
    
    <button id="addBtn" class="add-btn" style="display: none;">+</button>
    <button id="sortBtn" class="sort-btn" title="Сменить сортировку">⟳</button>
    <input type="file" id="fileInput" multiple accept="image/*" style="display: none;">

    <!-- AWS SDK v2 (работает стабильно) -->
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1479.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exif-js@2.3.0/exif.min.js"></script>
    <script src="app.js"></script>

</body>
</html>
