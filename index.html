<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shevtsov Media</title>
    <link rel="stylesheet" href="style.css">
</head>
    <!-- БЛЮР ДЛЯ ДРАГАНДРОП -->
<div id="dragOverlay" class="drag-overlay">Drop photo and load it</div>
    <!-- КНОПКА ДОБАВЛЕНИЯ ТЕГОВ -->
<div id="editModal" class="edit-modal">
    <div class="edit-modal-content">
        <h3 style="margin:0 0 10px; color:#fff; font-size:18px;">Редактировать год</h3>
        <label style="color:#ccc; font-size:14px; display:block; margin-bottom:5px;">Год:</label>
        <input type="number" id="editYearInput" min="1900" max="2100" placeholder="Например: 2024" style="width:100%; padding:8px; border-radius:6px; border:1px solid #444; background:#222; color:#fff; font-size:16px; text-align:center;">
        <div class="edit-modal-actions" style="display:flex; gap:10px; justify-content:center; margin-top:15px;">
            <button id="cancelEditBtn" style="padding:8px 16px; border:none; border-radius:6px; background:#444; color:#fff; cursor:pointer;">Отмена</button>
            <button id="saveEditBtn" title="Применить" style="padding:8px 16px; border:none; border-radius:6px; background:#2ecc71; color:#fff; cursor:pointer; display:flex; align-items:center; gap:6px;">
                <img src="edit.png" style="width:16px; height:16px;">
            </button>
        </div>
        <div id="editSuccessMsg" style="color:#2ecc71; margin-top:12px; font-size:13px; opacity:0; transition:opacity 0.3s; height:20px;">✓ тег добавлен</div>
    </div>
</div>

<body>
    <main id="gallery" class="gallery"></main>
    
    <button id="addBtn" class="add-btn" style="display: none;">+</button>
    <button id="sortBtn" class="sort-btn" title="Сменить сортировку">⟳</button>
    <input type="file" id="fileInput" multiple accept="image/*" style="display: none;">

    <!-- AWS SDK v2 (работает стабильно) -->
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1479.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exif-js@2.3.0/exif.min.js"></script>
    <script src="app.js"></script>

</body>
</html>
