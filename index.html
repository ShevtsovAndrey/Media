<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="gallery" class="gallery"></main>
    
    <button id="addBtn" class="add-btn" style="display: none;">+</button>
    <input type="file" id="fileInput" multiple accept="image/*" style="display: none;">

    <!-- Правильная загрузка AWS SDK v3 -->
    <script type="module">
        import { S3Client, PutObjectCommand, DeleteObjectCommand } from 'https://cdn.skypack.dev/@aws-sdk/client-s3@3.500.0';
        
        // Делаем доступным для app.js
        window.AWS = { S3Client, PutObjectCommand, DeleteObjectCommand };
        
        // Загружаем app.js после инициализации
        const script = document.createElement('script');
        script.src = 'app.js';
        document.body.appendChild(script);
    </script>
</body>
</html>
